services:
  db:
    image: mysql:8.0
    restart: unless-stopped

    env_file:
      - .env

    environment:
      MYSQL_ROOT_PASSWORD: Gloup#123
      MYSQL_DATABASE: gloupProdDB

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pGloup#123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    image: gloup-api:${IMAGE_TAG:-latest}

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      DB_HOST: db
      DB_USERNAME: root
      DB_PASSWORD: Gloup#123
      PRIVATE_KEY: /app/src/core/utils/AuthKey_3L95Q89942.p8
      CLIENT_ID: com.gloup.userapp
      TEAM_ID: HP59PZAVRP
      KEY_ID: 3L95Q89942
      GOOGLE_APPLICATION_CREDENTIALS: /app/config/firebase.json
      GCS_PROJECT_ID: project-981a5f33-4fa3-4d79-ab5
      GCS_BUCKET: gloup-images
      GCS_BASE_URL: https://storage.googleapis.com/gloup-images

    dns:
      - 8.8.8.8
      - 8.8.4.4

    ports:
      - "${HOST_PORT:-5678}:${APP_PORT:-5678}"

    volumes:
      - ./upload:/app/upload
      - ./config/firebase.json:/app/config/firebase.json:ro

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch('http://127.0.0.1:5678/status')
          .then(r=>process.exit(r.ok?0:1))
          .catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    shm_size: "256mb"

    security_opt:
      - no-new-privileges:true

    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
  redis:
    image: redis:7-alpine
    container_name: gloup-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  db_data:
  grafana_data:
  prometheus_data:
