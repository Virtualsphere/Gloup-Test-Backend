name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: avipa
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd /var/www/gloup/backend/Gloup-Test-Backend

            echo "Pulling latest code..."
            git pull origin main

            echo "Building and starting containers (Near Zero-Downtime)..."
            docker compose up -d --build

            echo "Waiting for app health..."
            for i in $(seq 1 30); do
              if docker compose exec -T app node -e "fetch('http://127.0.0.1:5678/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
                break
              fi
              sleep 3
            done

            echo "Migration status (applied on app startup; confirm no pending):"
            docker compose exec -T app node scripts/migrate.mjs status || true

            echo "Cleaning up old dangling images..."
            docker image prune -f

            echo "Deployment completed"

            docker ps